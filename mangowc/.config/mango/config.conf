# More option see https://github.com/DreamMaoMao/mango/wiki/

# Monitor Configuration
# DP-2: 2560x1600 @ 60Hz, positioned at 0x687
monitorrule=name:DP-2,width:2560,height:1600,refresh:60,x:0,y:687,scale:1

# DP-3: 3840x2160 @ 60Hz, rotated 270° (transform 3), positioned at 3840x0
monitorrule=name:DP-3,width:3840,height:2160,refresh:60,x:3840,y:0,scale:1,rr:3

# eDP-1: 2880x1920 @ 60Hz, positioned at 0x0, no scaling
monitorrule=name:eDP-1,width:2880,height:1920,refresh:60,x:0,y:0,scale:1.5

# Autostart
exec-once=waybar &
exec=/home/probird5/.config/hypr/scripts/wallpaper.sh

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
# Disabled all animations except window dragging/moving
animations=1
layer_animations=0
animation_type_open=none
animation_type_close=none
animation_fade_in=0
animation_fade_out=0
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=0
animation_duration_tag=0
animation_duration_close=0
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
click_method=2
button_map=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# Translated from Hyprland config

# Reload config
bind=SUPER,r,reload_config

# Terminal and launcher
bind=SUPER,Return,spawn,foot
bind=SUPER,p,spawn,rofi -show drun -show-icons -theme /home/probird5/.config/rofi/theme.rasi

# File manager
bind=SUPER,e,spawn,thunar

# Window management
bind=SUPER,q,killclient,
bind=SUPER+SHIFT,q,quit
bind=SUPER,v,togglefloating,

# Fullscreen
bind=SUPER,d,togglefullscreen,
bind=SUPER,m,togglemaximizescreen,

# Screenshot
bind=NONE,Print,spawn,grim -g "$(slurp -d)" - | swappy -f -

# Lock screen
bind=SUPER+SHIFT,Escape,spawn,swaylock

# Window focus - Arrow keys
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# Window focus - Vim keys
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# Move windows - Arrow keys
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# Move windows - Vim keys
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down

# Resize windows - Arrow keys
bind=SUPER+CTRL,Left,resizewin,-20,+0
bind=SUPER+CTRL,Right,resizewin,+20,+0
bind=SUPER+CTRL,Up,resizewin,+0,-20
bind=SUPER+CTRL,Down,resizewin,+0,+20

# Resize windows - Vim keys
bind=SUPER+CTRL,h,resizewin,-20,+0
bind=SUPER+CTRL,l,resizewin,+20,+0
bind=SUPER+CTRL,k,resizewin,+0,-20
bind=SUPER+CTRL,j,resizewin,+0,+20

# Switch to workspace/tag
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0
bind=SUPER,0,view,10,0

# Move window to workspace/tag
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0
bind=SUPER+SHIFT,0,tag,10,0

# Special workspace (scratchpad)
bind=SUPER,s,toggle_scratchpad
bind=SUPER+SHIFT,s,tag,special,0

# Dwindle/tiling layout controls
bind=SUPER,n,switch_layout
bind=SUPER,b,switch_layout

# Media keys
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 5%-
bind=NONE,XF86AudioRaiseVolume,spawn,pamixer -i 5
bind=NONE,XF86AudioLowerVolume,spawn,pamixer -d 5
bind=NONE,XF86AudioMicMute,spawn,pamixer --default-source -m
bind=NONE,XF86AudioMute,spawn,pamixer -t
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPause,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_left,toggleoverview,1
mousebind=NONE,btn_right,killclient,0

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
